name: release
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. ayatana-v1, wemeet-stack-opencv4-v1)"
        required: true
      manifest:
        description: "Manifest file to build"
        required: true
        default: ayatana-stack.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      # Runtime/SDK and the archive naming are derived from the manifest itself,
      # so this one workflow serves every stack (GNOME- or freedesktop-based)
      # without per-stack inputs.
      - name: Parse manifest
        id: m
        run: |
          set -euo pipefail
          python3 - "${{ inputs.manifest }}" >> "$GITHUB_OUTPUT" <<'PY'
          import re, sys, os
          text = open(sys.argv[1]).read()
          def val(key):
              mo = re.search(r'(?m)^%s:\s*(.+?)\s*$' % re.escape(key), text)
              return mo.group(1).strip().strip('\'"') if mo else ''
          runtime = val('runtime')
          rtv     = val('runtime-version')
          sdk     = val('sdk')
          stackdir = os.path.basename(sys.argv[1])[:-4]  # strip .yml
          plat = 'fd' if 'freedesktop' in runtime else 'gnome' if 'gnome' in runtime else runtime.split('.')[1].lower()
          print(f"runtime={runtime}")
          print(f"rtv={rtv}")
          print(f"sdk={sdk}")
          print(f"stackdir={stackdir}")
          print(f"slug={plat}-{rtv}-x86_64")
          PY

      - name: Install runtime + SDK
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y --noninteractive flathub \
            "${{ steps.m.outputs.sdk }}//${{ steps.m.outputs.rtv }}" \
            "${{ steps.m.outputs.runtime }}//${{ steps.m.outputs.rtv }}"

      - name: Build stack
        run: flatpak-builder --user --force-clean --disable-rofiles-fuse builddir "${{ inputs.manifest }}"

      - name: Pack
        id: pack
        run: |
          set -euo pipefail
          name="${{ steps.m.outputs.stackdir }}-${{ inputs.tag }}-${{ steps.m.outputs.slug }}.tar.xz"
          # Single top-level dir so flatpak-builder's default strip-components=1
          # leaves lib/... at the extraction root.
          mv builddir/files "${{ steps.m.outputs.stackdir }}"
          # Deterministic-ish tar: sorted names, fixed owner.
          XZ_OPT=-T0 tar --sort=name --owner=0 --group=0 --numeric-owner -cJf "$name" "${{ steps.m.outputs.stackdir }}"
          sha256sum "$name" | tee "$name.sha256"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" \
            "${{ steps.pack.outputs.name }}" \
            "${{ steps.pack.outputs.name }}.sha256" \
            --title "${{ steps.m.outputs.stackdir }} ${{ inputs.tag }} (${{ steps.m.outputs.slug }})" \
            --notes "Built from ${{ inputs.manifest }} by workflow run ${{ github.run_id }} from commit ${{ github.sha }}. Exact sources, pins and patches: ${{ inputs.manifest }} at this tag."
